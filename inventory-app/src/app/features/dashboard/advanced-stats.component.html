<div class="card panel">
  <div class="pt">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
    Valor de inventario por categoría
  </div>

  @for (stat of categoryStats(); track stat.category) {
    <div class="bar">
      <div class="bl">{{ stat.category }}</div>
      <div class="bt"><i [style.width.%]="stat.percent"></i></div>
      <div class="bv">{{ stat.value | currency:'USD':'symbol':'1.2-2' }}</div>
    </div>
  }

  <p class="lead" style="margin-top:14px">
    {{ lowStockCount() }} producto(s) por debajo o en su stock mínimo.
  </p>
</div>
