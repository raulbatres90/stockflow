spring:
  application:
    name: inventory-service
  jpa:
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      encoding: UTF-8

  datasource:
    url: jdbc:h2:mem:stockflow;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
    # HikariCP ajustado para un escenario de carga media (demo H2 en memoria, trafico concurrente moderado)
    hikari:
      # 10 conexiones cubren las solicitudes concurrentes del dashboard + registro de movimientos
      # sin sobre-provisionar una base de datos H2 en memoria que no tiene costo real de conexion.
      maximum-pool-size: 10
      # Mantiene la mitad del pool activa para que los picos de solicitudes no paguen el costo de abrir conexiones nuevas.
      minimum-idle: 5
      # 30s: tiempo suficiente para obtener una conexion bajo carga moderada antes de fallar rapido y mostrar un error.
      connection-timeout: 30000
      # 10 minutos: libera conexiones inactivas mas alla del minimo, sin desgastar el pool.
      idle-timeout: 600000

resilience4j:
  circuitbreaker:
    instances:
      alertsService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3

  retry:
    instances:
      movementService:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - com.stockflow.inventory_service.exception.ProductNotFoundException
          - com.stockflow.inventory_service.exception.InsufficientStockException

  ratelimiter:
    instances:
      historyService:
        limit-for-period: 10
        limit-refresh-period: 1s
        timeout-duration: 0

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always
  info:
    app:
      name: inventory-service
      description: Microservicio de monitoreo de inventario en tiempo real para StockFlow Inc.
      version: 1.0.0
